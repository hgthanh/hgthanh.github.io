<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Page Not Found</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query
      // string into just the hash fragment, and then redirects the browser
      // to the new url with the hash fragment and without the path or query string.
      // This allows HTML5 history to be used in single page apps while still
      // allowing web servers to serve the same set of files for all url paths.
      (function() {
        var redirect = sessionStorage.getItem("redirect");
        delete sessionStorage.removeItem("redirect");
        if (redirect && redirect != location.href) {
          history.replaceState(null, null, redirect);
        }
        var path = location.pathname;
        var query = location.search;
        var fragment = location.hash;
        if (path != "/" && path != "/index.html" && !fragment) {
          sessionStorage.setItem("redirect", location.href);
          location.replace(location.protocol + "//" + location.hostname + (location.port ? ":" + location.port : "") + location.pathname.split("/").slice(0, -1).join("/") + "/index.html" + "#" + path + query);
        }
      })();
    </script>
  </head>
  <body>
  </body>
</html>
